apiVersion: v1
kind: Canvas
metadata:
  name: software-factory
  description: "Turns a GitHub issue into a deployed PoC with no human touching the code. Each stage validates the previous one before moving on."
spec:
  nodes:
    - id: trigger-new-issue
      name: New Issue
      type: TYPE_TRIGGER
      component: start
      position:
        x: 0
        "y": 0
      configuration:
        templates:
          - name: Run Software Factory
            parameters:
              - name: issue_number
                title: Issue Number
                type: string
                defaultString: "5368"
                placeholder: GitHub issue number to implement
              - name: repo
                title: Repository (owner/name)
                type: string
                defaultString: "superplanehq/superplane"
                placeholder: owner/repo
              - name: base_branch
                title: Base Branch
                type: string
                defaultString: "main"
            payload:
              issue_number: '{{ parameters["issue_number"] }}'
              repo: '{{ parameters["repo"] }}'
              base_branch: '{{ parameters["base_branch"] }}'

    - id: get-issue
      name: Get Issue
      type: TYPE_ACTION
      component: github.getIssue
      position:
        x: 480
        "y": 0
      configuration:
        repository: '{{ root().data.repo }}'
        issueNumber: '{{ root().data.issue_number }}'

    - id: generate-spec
      name: Generate Spec
      type: TYPE_ACTION
      component: openai.textPrompt
      position:
        x: 960
        "y": 0
      configuration:
        model: MBZUAI-IFM/K2-Think-v2
        input: |-
          You are a senior software architect. Given the GitHub issue below, produce
          a precise, actionable implementation spec that a coding agent can follow.

          Repository: {{ root().data.repo }}
          Issue #{{ root().data.issue_number }}: {{ $["Get Issue"].data.title }}

          Issue body:
          {{ $["Get Issue"].data.body }}

          Respond with ONLY a JSON object (no markdown fences) in this exact shape:
          {
            "title": "brief implementation title",
            "summary": "2-3 sentence description of what needs to be built",
            "files_to_modify": ["list of specific file paths likely to change"],
            "implementation_steps": ["ordered, concrete coding steps"],
            "acceptance_criteria": ["testable conditions that define done"],
            "branch_name": "feature/issue-{{ root().data.issue_number }}-slug"
          }

    - id: validate-spec
      name: Validate Spec
      type: TYPE_ACTION
      component: filter
      position:
        x: 1440
        "y": 0
      configuration:
        expression: '$["Generate Spec"].data.text != null && $["Generate Spec"].data.text.length > 100'

    - id: implement-code
      name: Implement Code
      type: TYPE_ACTION
      component: http
      position:
        x: 1920
        "y": 0
      configuration:
        method: POST
        url: "https://software-factory-coder.onrender.com/implement"
        headers:
          Content-Type: application/json
          X-Factory-Secret: '{{ env("FACTORY_SECRET") }}'
        body: '{"repo":"{{ root().data.repo }}","issue_number":"{{ root().data.issue_number }}","base_branch":"{{ root().data.base_branch }}","spec":{{ $["Generate Spec"].data.text }},"github_token":"{{ env("GITHUB_TOKEN") }}"}'
        timeoutSeconds: 600

    - id: validate-implementation
      name: Validate Build
      type: TYPE_ACTION
      component: filter
      position:
        x: 2400
        "y": 0
      configuration:
        expression: '$["Implement Code"].data.body.success == true'

    - id: create-pr
      name: Create Pull Request
      type: TYPE_ACTION
      component: github.createPullRequest
      position:
        x: 2880
        "y": 0
      configuration:
        repository: '{{ root().data.repo }}'
        title: 'feat(#{{ root().data.issue_number }}): {{ $["Get Issue"].data.title }}'
        head: '{{ $["Implement Code"].data.body.branch }}'
        base: '{{ root().data.base_branch }}'
        body: "## Auto-generated PoC\n\nCloses #{{ root().data.issue_number }}\n\n### Summary\n{{ $[\"Implement Code\"].data.body.spec_summary }}\n\n### Files changed\n{{ $[\"Implement Code\"].data.body.files_changed }}\n\n*Generated by Software Factory on SuperPlane. No human wrote this code.*"

    - id: validate-pr
      name: Validate PR Exists
      type: TYPE_ACTION
      component: filter
      position:
        x: 3360
        "y": 0
      configuration:
        expression: '$["Create Pull Request"].data.number != null'

    - id: trigger-render-deploy
      name: Trigger Render Deploy
      type: TYPE_ACTION
      component: http
      position:
        x: 3840
        "y": 0
      configuration:
        method: POST
        url: "https://software-factory-coder.onrender.com/deploy"
        headers:
          Content-Type: application/json
          X-Factory-Secret: '{{ env("FACTORY_SECRET") }}'
        body: '{"repo":"{{ root().data.repo }}","branch":"{{ $["Implement Code"].data.body.branch }}","pr_number":"{{ $["Create Pull Request"].data.number }}"}'
        timeoutSeconds: 600

    - id: validate-deploy
      name: Validate Deploy Live
      type: TYPE_ACTION
      component: filter
      position:
        x: 4320
        "y": 0
      configuration:
        expression: '$["Trigger Render Deploy"].data.body.preview_url != null && $["Trigger Render Deploy"].data.body.status == "live"'

    - id: post-preview-link
      name: Post Preview Link
      type: TYPE_ACTION
      component: github.createIssueComment
      position:
        x: 4800
        "y": 0
      configuration:
        repository: '{{ root().data.repo }}'
        issueNumber: '{{ root().data.issue_number }}'
        body: "## Preview Ready!\n\nYour proof-of-concept is live: {{ $[\"Trigger Render Deploy\"].data.body.preview_url }}\n\nPR: {{ $[\"Create Pull Request\"].data.html_url }}\nBranch: {{ $[\"Implement Code\"].data.body.branch }}\nBuild time: {{ $[\"Trigger Render Deploy\"].data.body.build_duration_s }}s\n\n*No human wrote this code.*"

  edges:
    - sourceId: trigger-new-issue
      targetId: get-issue
      channel: default
    - sourceId: get-issue
      targetId: generate-spec
      channel: default
    - sourceId: generate-spec
      targetId: validate-spec
      channel: default
    - sourceId: validate-spec
      targetId: implement-code
      channel: default
    - sourceId: implement-code
      targetId: validate-implementation
      channel: success
    - sourceId: validate-implementation
      targetId: create-pr
      channel: default
    - sourceId: create-pr
      targetId: validate-pr
      channel: default
    - sourceId: validate-pr
      targetId: trigger-render-deploy
      channel: default
    - sourceId: trigger-render-deploy
      targetId: validate-deploy
      channel: success
    - sourceId: validate-deploy
      targetId: post-preview-link
      channel: default
